<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Quiz Application</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="container">

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="screen active">
      <h1>Interactive Quiz Application</h1>
      <p>Test your knowledge with this fun quiz.</p>
      <p>Total Questions: <strong>10</strong></p>
      <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">

      <h2 id="progress">Question 1 of 10</h2>

      <h3 id="question"></h3>

      <div id="options-container"></div>

      <div class="navigation">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
        <button id="submit-btn">Submit Quiz</button>
      </div>

    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">

      <h1>Quiz Completed 🎉</h1>

      <p id="score"></p>
      <p id="correct"></p>
      <p id="wrong"></p>
      <p id="percentage"></p>
      <h2 id="performance"></h2>

      <button id="restart-btn">Restart Quiz</button>

    </div>

  </div>

  <script src="index.js"></script>

</body>
</html>
