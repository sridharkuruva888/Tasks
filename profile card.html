<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        height: 100vh;
        background: #e9edf3;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .profile-card {
        width: 320px;
        background: #ffffff;
        border-radius: 20px;
        padding: 30px 25px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }
      .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        padding: 5px;
        background: linear-gradient(135deg, #5b7cfa, #8a5cf6);
        margin: 0 auto 15px;
      }

      .profile-img img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Name */
      .profile-card h2 {
        font-size: 22px;
        color: #222;
        margin-bottom: 5px;
      }

      /* Role */
      .profile-card p.role {
        color: #888;
        font-size: 14px;
        margin-bottom: 25px;
      }

      /* Stats Section */
      .container {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
      }

      .box h3 {
        font-size: 18px;
        color: #222;
      }

      .box span {
        font-size: 13px;
        color: #888;
      }

      /* Button */
      .follow-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 30px;
        color: white;
        font-size: 15px;
        cursor: pointer;
        background: linear-gradient(135deg, #5b7cfa, #8a5cf6);
        transition: 0.5s;
      }
      .follow-btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="profile-card">
      <div class="profile-img">
        <img src="assets/sridhar img.jpeg" alt="profile" />
      </div>
      <h2>Sridhar Kuruva</h2>
      <p class="role">Associate Software Engineer</p>
      <div class="container">
        <div class="box">
          <h3>10k</h3>
          <span>followers</span>
        </div>
        <div class="box">
          <h3>1k</h3>
          <span>following</span>
        </div>
        <div class="box">
          <h3>10</h3>
          <span>projects</span>
        </div>
      </div>
      <button class="follow-btn" onclick="alert('Request sent successfully')">
        Follow User
      </button>
    </div>
  </body>
</html>
