<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticket Pricing</title>
</head>
<body>

    <h2>Movie Ticket Pricing</h2>

    <label>Enter Age:</label>
    <input type="number" id="age">
    <br><br>

    <label>Select Showtime:</label>
    <select id="showtime">
        <option value="matinee">Matinee</option>
        <option value="evening">Evening</option>
    </select>
    <br><br>

    <button onclick="calculatePrice()">Check Price</button>

    <h3 id="result"></h3>

    <script>
        function calculatePrice() {
            let age = Number(document.getElementById("age").value);
            let showtime = document.getElementById("showtime").value;
            let result = document.getElementById("result");

            
            if (isNaN(age) || age < 0) {
                result.innerHTML = "Please enter a valid age.";
            }

            
            else if (age < 12) {
                result.innerHTML = "Child Ticket Price: Rs.5";
            }

            
            else if (age >= 65) {
                result.innerHTML = "Senior Ticket Price: Rs.7";
            }

            
            else if (showtime === "matinee") {
                result.innerHTML = "Adult Matinee Ticket Price: Rs.10";
            }

            
            else {
                result.innerHTML = "Adult Evening Ticket Price: Rs.15";
            }
        }
    </script>

</body>
</html>
